services:
  - type: web
    name: chemlab-web-portal
    env: node
    region: singapore # closest to PH
    plan: free
    rootDir: web
    buildCommand: npm install
    startCommand: node --dns-result-order=ipv4first server.js
    envVars:
      # ── Deployment ───────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        fromContext: render.externalUrl

      # ── Session — auto-generated secure random value ────────────
      - key: SESSION_SECRET
        generateValue: true

      # ── Supabase Database ───────────────────────────────────────
      - key: SUPABASE_HOST
        sync: false
      - key: SUPABASE_PORT
        sync: false
      - key: SUPABASE_DB
        sync: false
      - key: SUPABASE_USER
        sync: false
      - key: SUPABASE_PASS
        sync: false

      # ── Email (Resend API) ──────────────────────────────────────
      # Note: Free tier Resend accounts should use 'onboarding@resend.dev'
      # for the from address and the registered email for ADMIN_EMAIL.
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        value: ChemLab System
